<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVS Furniture - Service Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .split-container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--background-light);
        }
        
        /* Left: Showroom Banner Side */
        .showroom-side {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(139, 94, 60, 0.8) 0%, rgba(26, 37, 47, 0.9) 100%), url('assets/images/login_showroom.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            color: white;
            position: relative;
        }

        .showroom-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(42, 157, 143, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .showroom-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .showroom-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 2.25rem;
            font-family: var(--font-heading);
            font-weight: 800;
            color: white;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .showroom-logo svg {
            color: var(--secondary-color);
        }

        .showroom-title {
            font-size: 2.5rem;
            font-family: var(--font-heading);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: #FFFFFF;
        }

        .showroom-tagline {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            border-left: 4px solid var(--secondary-color);
            padding-left: 1.25rem;
        }

        /* Right: Login Form Side */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background-color: var(--background-light);
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
            opacity: 0;
        }

        .login-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .login-header h2 {
            font-size: 1.75rem;
            color: var(--text-primary);
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        #loginError {
            background-color: rgba(231, 76, 60, 0.08);
            border-left: 4px solid var(--danger-color);
            color: #c0392b;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: none;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            margin-bottom: 1.75rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
            color: var(--text-secondary);
        }

        .checkbox-container input {
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        /* Responsive Layouts */
        @media (max-width: 992px) {
            .showroom-side {
                display: none;
            }
            .form-side {
                flex: 1;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- Showroom Panel -->
        <div class="showroom-side">
            <div class="showroom-content">
                <div class="showroom-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
                    </svg>
                    <span>SVS Furniture Works</span>
                </div>
                <h1 class="showroom-title">Premium After-Sales Service & Support</h1>
                <div class="showroom-tagline">
                    Customer Support & Warranty Management Portal. Register products, file issue tickets, and track professional woodwork resolutions.
                </div>
            </div>
        </div>

        <!-- Login Form Panel -->
        <div class="form-side">
            <div class="card login-card">
                <div class="login-header">
                    <h2>Sign In</h2>
                    <p>Enter credentials to access SVS Service Hub</p>
                </div>
                
                <div id="loginError"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">Username or Email</label>
                        <input type="text" id="username" class="form-control" placeholder="admin / customer1" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 1.25rem;">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="remember-forgot">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember">
                            <span>Remember Me</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Sign In</button>
                    
                    <div style="text-align: center; font-size: 0.875rem;">
                        <span style="color: var(--text-secondary);">New customer?</span>
                        <a href="register.html" style="font-weight: 700; margin-left: 0.25rem;">Create an Account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/login.js"></script>
</body>
</html>
